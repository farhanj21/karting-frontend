name: Sync to MongoDB

# NOTE: This workflow was moved from the karting-backend repo. It now lives in
# karting-frontend and operates on the scraper data under backend/.
# Requires a repository secret named MONGODB_URI configured on THIS repo
# (Settings > Secrets and variables > Actions).

on:
  push:
    paths:
      - 'backend/Sportzilla/data_sportzilla_sprint_karts.csv'
      - 'backend/Sportzilla/data_sportzilla_championship_karts.csv'
      - 'backend/Sportzilla/data_sportzilla_pro_karts.csv'
      - 'backend/2F2F-Lahore/data_2f2f_rx8.csv'
      - 'backend/2F2F-Lahore/data_2f2f_sr5.csv'
      - 'backend/2F2F-Islamabad/data_2f2f_islamabad_sr5.csv'
      - 'backend/Apex Autodrome/data_apex.csv'
      - 'backend/Omni Circuit/data_omni_circuit_rt8.csv'
      - 'backend/Omni Circuit/data_omni_circuit_rx250.csv'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-to-mongodb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/sync/requirements.txt

      - name: Verify CSV files exist
        run: |
          echo "Checking for CSV files..."

          # Check Sportzilla kart-specific CSV files
          SPORTZILLA_FOUND=false
          if [ -f "backend/Sportzilla/data_sportzilla_sprint_karts.csv" ]; then
            echo "✓ Found Sportzilla Sprint Karts CSV ($(wc -l < backend/Sportzilla/data_sportzilla_sprint_karts.csv) lines)"
            SPORTZILLA_FOUND=true
          fi
          if [ -f "backend/Sportzilla/data_sportzilla_championship_karts.csv" ]; then
            echo "✓ Found Sportzilla Championship Karts CSV ($(wc -l < backend/Sportzilla/data_sportzilla_championship_karts.csv) lines)"
            SPORTZILLA_FOUND=true
          fi
          if [ -f "backend/Sportzilla/data_sportzilla_pro_karts.csv" ]; then
            echo "✓ Found Sportzilla Pro Karts CSV ($(wc -l < backend/Sportzilla/data_sportzilla_pro_karts.csv) lines)"
            SPORTZILLA_FOUND=true
          fi

          if [ "$SPORTZILLA_FOUND" = false ]; then
            echo "✗ No Sportzilla CSV files found"
            exit 1
          fi

          # Check 2F2F Formula Karting CSV files
          F2F2F_FOUND=false
          if [ -f "backend/2F2F-Lahore/data_2f2f_rx8.csv" ]; then
            echo "✓ Found 2F2F Lahore RX8 CSV ($(wc -l < backend/2F2F-Lahore/data_2f2f_rx8.csv) lines)"
            F2F2F_FOUND=true
          fi
          if [ -f "backend/2F2F-Lahore/data_2f2f_sr5.csv" ]; then
            echo "✓ Found 2F2F Lahore SR5 CSV ($(wc -l < backend/2F2F-Lahore/data_2f2f_sr5.csv) lines)"
            F2F2F_FOUND=true
          fi
          if [ -f "backend/2F2F-Islamabad/data_2f2f_islamabad_sr5.csv" ]; then
            echo "✓ Found 2F2F Islamabad SR5 CSV ($(wc -l < backend/2F2F-Islamabad/data_2f2f_islamabad_sr5.csv) lines)"
            F2F2F_FOUND=true
          fi

          if [ "$F2F2F_FOUND" = false ]; then
            echo "✗ No 2F2F CSV files found"
            exit 1
          fi

          # Check Apex Autodrome CSV
          if [ -f "backend/Apex Autodrome/data_apex.csv" ]; then
            echo "✓ Found Apex CSV ($(wc -l < 'backend/Apex Autodrome/data_apex.csv') lines)"
          else
            echo "✗ Apex CSV not found"
            exit 1
          fi

          # Check Omni Circuit CSV files
          OMNI_FOUND=false
          if [ -f "backend/Omni Circuit/data_omni_circuit_rt8.csv" ]; then
            echo "✓ Found Omni Circuit RT8 CSV ($(wc -l < 'backend/Omni Circuit/data_omni_circuit_rt8.csv') lines)"
            OMNI_FOUND=true
          fi
          if [ -f "backend/Omni Circuit/data_omni_circuit_rx250.csv" ]; then
            echo "✓ Found Omni Circuit RX250 CSV ($(wc -l < 'backend/Omni Circuit/data_omni_circuit_rx250.csv') lines)"
            OMNI_FOUND=true
          fi

          if [ "$OMNI_FOUND" = false ]; then
            echo "✗ No Omni Circuit CSV files found"
            exit 1
          fi

      - name: Sync data to MongoDB
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python backend/sync/sync_to_mongodb.py

      - name: Upload CSV files (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: csv-files
          path: |
            backend/Sportzilla/*.csv
            backend/2F2F-Lahore/*.csv
            backend/2F2F-Islamabad/*.csv
            backend/Apex Autodrome/*.csv
            backend/Omni Circuit/*.csv
          retention-days: 7

      - name: Notify on completion
        if: success()
        run: |
          echo "✓ MongoDB sync completed successfully!"
          echo "Timestamp: $(date)"
          echo ""
          echo "Sportzilla Records:"
          if [ -f "backend/Sportzilla/data_sportzilla_sprint_karts.csv" ]; then
            echo "  - Sprint Karts: $(wc -l < backend/Sportzilla/data_sportzilla_sprint_karts.csv) records"
          fi
          if [ -f "backend/Sportzilla/data_sportzilla_championship_karts.csv" ]; then
            echo "  - Championship Karts: $(wc -l < backend/Sportzilla/data_sportzilla_championship_karts.csv) records"
          fi
          if [ -f "backend/Sportzilla/data_sportzilla_pro_karts.csv" ]; then
            echo "  - Pro Karts: $(wc -l < backend/Sportzilla/data_sportzilla_pro_karts.csv) records"
          fi
          echo ""
          echo "2F2F Formula Karting Lahore Records:"
          if [ -f "backend/2F2F-Lahore/data_2f2f_rx8.csv" ]; then
            echo "  - RX8: $(wc -l < backend/2F2F-Lahore/data_2f2f_rx8.csv) records"
          fi
          if [ -f "backend/2F2F-Lahore/data_2f2f_sr5.csv" ]; then
            echo "  - SR5: $(wc -l < backend/2F2F-Lahore/data_2f2f_sr5.csv) records"
          fi
          echo ""
          echo "2F2F Formula Karting Islamabad Records:"
          if [ -f "backend/2F2F-Islamabad/data_2f2f_islamabad_sr5.csv" ]; then
            echo "  - SR5: $(wc -l < backend/2F2F-Islamabad/data_2f2f_islamabad_sr5.csv) records"
          fi
          echo ""
          echo "Apex: $(wc -l < 'backend/Apex Autodrome/data_apex.csv') records"
          echo ""
          echo "Omni Karting Circuit Records:"
          if [ -f "backend/Omni Circuit/data_omni_circuit_rt8.csv" ]; then
            echo "  - RT8: $(wc -l < 'backend/Omni Circuit/data_omni_circuit_rt8.csv') records"
          fi
          if [ -f "backend/Omni Circuit/data_omni_circuit_rx250.csv" ]; then
            echo "  - RX250: $(wc -l < 'backend/Omni Circuit/data_omni_circuit_rx250.csv') records"
          fi
